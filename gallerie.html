<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css?v=1003">
    <title>Gallery Cas</title>
</head>

<body class="body">
    <div class="controls">
        <button class="button"><a href="gallerie2.html">extra foto's</a></button>
        <button id="speed-btn" onclick="changeSpeed()">Snelheid: Langzaam</button>
    </div>

    <div id="gallery-container"></div>

    <script>
        const username = 'Daviddesteenhuijsen'; 
        const repo = 'cas_gallery';
        const folderPath = ''; 

        const container = document.getElementById('gallery-container');
        const speedBtn = document.getElementById('speed-btn');

        // Snelheid instellingen (in seconden)
        let speeds = [80, 40, 15]; 
        let labels = ['Langzaam', 'Medium', 'Snel'];
        let currentSpeedIndex = 0;

        function changeSpeed() {
            currentSpeedIndex = (currentSpeedIndex + 1) % speeds.length;
            container.style.animationDuration = speeds[currentSpeedIndex] + 's';
            speedBtn.innerText = 'Snelheid: ' + labels[currentSpeedIndex];
        }

        async function fetchImages() {
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folderPath}`);
                if (!response.ok) throw new Error('GitHub error');
                const files = await response.json();

                files.forEach(file => {
                    if (file.name.match(/\.(gif|jpe?g|png|webp)$/i) && file.name !== 'gallerie.png') {
                        const img = document.createElement('img');
                        img.src = file.download_url; 
                        img.className = 'images';
                        img.alt = 'gallery';
                        container.appendChild(img);
                    }
                });
            } catch (error) {
                console.error('Fout:', error);
            }
        }

        fetchImages();
    </script>
</body>
</html>
