<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css?v=9999">
    <title>Gallery Cas</title>
</head>

<body class="body">
    <button class="button"><a href="gallerie2.html">extra foto's</a></button>

    <div id="gallery-container"></div>

    <script>
        const username = 'Daviddesteenhuijsen'; 
        const repo = 'cas_gallery';
        const folderPath = ''; 

        const container = document.getElementById('gallery-container');

        async function fetchImages() {
            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${folderPath}`);
                
                if (!response.ok) {
                    throw new Error('GitHub map niet gevonden');
                }

                const files = await response.json();

                files.forEach(file => {
                    // FILTER: Alleen plaatjes pakken, maar NIET 'gallerie.png'
                    if (file.name.match(/\.(gif|jpe?g|png|webp)$/i) && file.name !== 'gallerie.png') {
                        const img = document.createElement('img');
                        img.src = file.download_url; 
                        img.className = 'images';
                        img.alt = 'gallery';
                        container.appendChild(img);
                    }
                });
            } catch (error) {
                console.error('Fout:', error);
            }
        }

        fetchImages();
    </script>
</body>
</html>
